version: '3'

vars:
  CONTAINER: pce-rabbitmq
  AMQP_PORT: "5672"
  MGMT_PORT: "15672"

tasks:
  default:
    desc: "Start RabbitMQ (background) then application (foreground)"
    cmds:
      - task: rabbitmq:up
      - task: app:run

  # ─── RabbitMQ ────────────────────────────────────────────────────────────────

  rabbitmq:up:
    desc: "Start RabbitMQ container in background (auto-removed on stop)"
    cmds:
      - docker run --rm -d --name {{.CONTAINER}} -p {{.AMQP_PORT}}:5672 -p {{.MGMT_PORT}}:15672 -v "{{.TASKFILE_DIR}}/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro" -v "{{.TASKFILE_DIR}}/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro" rabbitmq:3.13-management
      - task: rabbitmq:wait

  rabbitmq:wait:
    desc: "Wait until RabbitMQ AMQP port is ready"
    silent: true
    cmds:
      - |
        echo "Waiting for RabbitMQ..."
        until bash -c "echo > /dev/tcp/localhost/{{.AMQP_PORT}}" 2>/dev/null; do
          sleep 1
        done
        echo "RabbitMQ ready — management UI at http://localhost:{{.MGMT_PORT}} (guest/guest)"

  rabbitmq:down:
    desc: "Stop RabbitMQ container (removed automatically)"
    cmds:
      - docker stop {{.CONTAINER}} || true

  rabbitmq:logs:
    desc: "Tail RabbitMQ logs"
    cmds:
      - docker logs -f {{.CONTAINER}}

  # ─── Application ─────────────────────────────────────────────────────────────

  app:run:
    desc: "Start the Spring Boot application (requires RabbitMQ up)"
    dir: "{{.TASKFILE_DIR}}/.."
    cmds:
      - mvn spring-boot:run -Dspring-boot.run.jvmArguments="--enable-preview"

  # ─── Composite ───────────────────────────────────────────────────────────────

  up:
    desc: "Start RabbitMQ (background) then application (foreground)"
    cmds:
      - task: rabbitmq:up
      - task: app:run

  down:
    desc: "Stop RabbitMQ (application must be stopped manually with Ctrl+C)"
    cmds:
      - task: rabbitmq:down
